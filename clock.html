<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>שעון מעורר חכם</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:650px;
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
}

input,
select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#status{
margin-top:20px;
text-align:center;
font-size:18px;
}

#alarmScreen{
display:none;
margin-top:20px;
padding:20px;
border-radius:15px;
background:#dc2626;
}

video{
width:100%;
border-radius:15px;
margin-top:15px;
}

canvas{
display:none;
}

.bigQuestion{
font-size:32px;
text-align:center;
margin-top:20px;
margin-bottom:20px;
font-weight:bold;
}

#answer{
text-align:center;
font-size:24px;
}

.taskInfo{
text-align:center;
margin-top:10px;
font-size:22px;
}

#aiStatus{
margin-top:15px;
text-align:center;
font-size:18px;
}

.success{
color:#4ade80;
}

.error{
color:#facc15;
}

.alarmTitle{
font-size:28px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>⏰ שעון מעורר חכם</h1>

<label>בחר שעה</label>
<input type="time" id="alarmTime">

<label>בחר משימה לכיבוי האזעקה</label>

<select id="taskType">

<optgroup label="צילום חפצים">

<option value="bottle">צלם בקבוק</option>
<option value="cup">צלם כוס</option>
<option value="book">צלם ספר</option>
<option value="chair">צלם כיסא</option>
<option value="laptop">צלם מחשב נייד</option>
<option value="keyboard">צלם מקלדת</option>
<option value="tv">צלם טלוויזיה</option>
<option value="plant">צלם צמח</option>
<option value="cellphone">צלם טלפון</option>

</optgroup>

<optgroup label="מתמטיקה">

<option value="add">חיבור</option>
<option value="subtract">חיסור</option>
<option value="multiply">כפל</option>
<option value="mixed">תרגיל אקראי</option>
<option value="fiveQuestions">5 תרגילים ברצף</option>

</optgroup>

</select>

<button onclick="setAlarm()">
הפעל אזעקה
</button>

<div id="status">
טוען מודל AI...
</div>

<div id="alarmScreen">

<div class="alarmTitle">
🚨 האזעקה מצלצלת 🚨
</div>

<div id="photoTask" style="display:none">

<div id="photoText" class="taskInfo"></div>

<video id="video" autoplay playsinline></video>

<button onclick="captureAndDetect()">
צלם ובדוק
</button>

<div id="aiStatus"></div>

</div>

<div id="mathTask" style="display:none">

<div id="question" class="bigQuestion"></div>

<input
id="answer"
type="number"
placeholder="הכנס תשובה">

<button onclick="checkMath()">
בדוק תשובה
</button>

</div>

</div>

</div>

<canvas id="canvas" width="640" height="480"></canvas>

<audio id="alarmSound" loop>
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let alarmTime=null;
let model=null;
let stream=null;

let currentObject="";
let correctAnswer=0;
let questionsLeft=0;

const objectMap={

bottle:"bottle",
cup:"cup",
book:"book",
chair:"chair",
laptop:"laptop",
keyboard:"keyboard",
tv:"tv",
plant:"potted plant",
cellphone:"cell phone"

};

async function loadModel(){

model=await cocoSsd.load();

document.getElementById("status").innerHTML=
"✅ המערכת מוכנה";

}

loadModel();

function setAlarm(){

alarmTime=
document.getElementById("alarmTime").value;

if(!alarmTime){
alert("בחר שעה");
return;
}

document.getElementById("status").innerHTML=
"⏰ האזעקה הוגדרה ל " + alarmTime;

}
  setInterval(()=>{

if(!alarmTime) return;

const now=new Date();

const current=
String(now.getHours()).padStart(2,"0")
+
":"
+
String(now.getMinutes()).padStart(2,"0");

if(current===alarmTime){

alarmTime=null;

startAlarm();

}

},1000);

async function startAlarm(){

document.getElementById("alarmScreen").style.display=
"block";

const sound=
document.getElementById("alarmSound");

try{
await sound.play();
}catch(e){
console.log(e);
}

const task=
document.getElementById("taskType").value;

document.getElementById("photoTask").style.display=
"none";

document.getElementById("mathTask").style.display=
"none";

if(objectMap[task]){

currentObject=objectMap[task];

document.getElementById("photoTask").style.display=
"block";

document.getElementById("photoText").innerHTML=
"📷 צלם: " + currentObject;

try{

stream=
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment"
}
});

document.getElementById("video").srcObject=
stream;

}catch(err){

alert("לא ניתן לפתוח מצלמה");

}

return;
}

if(task==="add"){

document.getElementById("mathTask").style.display=
"block";

createMathQuestion("add");

return;
}

if(task==="subtract"){

document.getElementById("mathTask").style.display=
"block";

createMathQuestion("subtract");

return;
}

if(task==="multiply"){

document.getElementById("mathTask").style.display=
"block";

createMathQuestion("multiply");

return;
}

if(task==="mixed"){

document.getElementById("mathTask").style.display=
"block";

createMathQuestion("mixed");

return;
}

if(task==="fiveQuestions"){

questionsLeft=5;

document.getElementById("mathTask").style.display=
"block";

createMathQuestion("mixed");

}
}

function createMathQuestion(type){

let a=
Math.floor(Math.random()*50)+1;

let b=
Math.floor(Math.random()*20)+1;

let question="";

if(type==="add"){

correctAnswer=a+b;

question=
a + " + " + b;

}

else if(type==="subtract"){

correctAnswer=a-b;

question=
a + " - " + b;

}

else if(type==="multiply"){

correctAnswer=a*b;

question=
a + " × " + b;

}

else{

const random=
Math.floor(Math.random()*3);

if(random===0){

correctAnswer=a+b;

question=
a + " + " + b;

}

if(random===1){

correctAnswer=a-b;

question=
a + " - " + b;

}

if(random===2){

correctAnswer=a*b;

question=
a + " × " + b;

}

}

document.getElementById("question").innerHTML=
question + " = ?";

document.getElementById("answer").value="";

}

function checkMath(){

const answer=
Number(
document.getElementById("answer").value
);

if(answer!==correctAnswer){

alert("❌ תשובה שגויה");
return;
}

const task=
document.getElementById("taskType").value;

if(task==="fiveQuestions"){

questionsLeft--;

if(questionsLeft<=0){

stopAlarm();
return;

}

alert(
"✅ נכון. נשארו עוד "
+
questionsLeft
+
" תרגילים"
);

createMathQuestion("mixed");

return;
}

stopAlarm();

}

async function captureAndDetect(){

if(!model){
alert("המודל עדיין נטען");
return;
}

const video=
document.getElementById("video");

const canvas=
document.getElementById("canvas");

const ctx=
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

document.getElementById("aiStatus").innerHTML=
"🔍 בודק תמונה...";

const predictions=
await model.detect(canvas);

let found=false;

for(let p of predictions){

if(
p.class===currentObject &&
p.score>0.5
){
found=true;
break;
}

}

if(found){

document.getElementById("aiStatus").innerHTML=
"✅ זוהה נכון!";

stopAlarm();

}else{

document.getElementById("aiStatus").innerHTML=
"❌ לא זוהה החפץ הנכון";

}

}

function stopAlarm(){

const sound=
document.getElementById("alarmSound");

sound.pause();
sound.currentTime=0;

document.getElementById("alarmScreen").style.display=
"none";

if(stream){

stream.getTracks().forEach(t=>t.stop());
stream=null;

}

alert("⏰ האזעקה כובתה");

}

</script>

</body>
</html>
